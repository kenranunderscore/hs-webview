name: "ci"
on:
  pull_request:
  push:
jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        set_as_trusted_user: false # Disable adding user to trusted-users to avoid eDSRecordAlreadyExists error
    - uses: cachix/cachix-action@v14
      with:
        name: hs-webview
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: nix build
